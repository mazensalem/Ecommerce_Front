
<main class="wrap">
  <div class="pdp">
    <!-- ============ gallery ============ -->
    <div>
      <div class="pdp-gallery-main">
        <img width="100%" height="100%" [src]="staticFilesPath + product.imgUrl" />
      </div>
    </div>

    <!-- ============ info ============ -->
    <div class="pdp-info">
      <div class="cat">{{product.catagory.name}} · {{product.subCatagory.name}}</div>
      <h1>{{product.title}}</h1>
      <div class="pdp-price"><span class="now">${{product.price}}</span></div>
      <p class="pdp-desc">
        {{product.desc}}
      </p>
    </div>

      <div class="option-block">
        <h4>Quantity</h4>
        <div class="qty-stepper">
          <button (click)="dec()" type="button">–</button>
          <input type="text" disabled [value]=quantatiy>
          <button (click)="inc()" type="button">+</button>
        </div>
        @if (product.stock < 5){
            <span style="margin-left:12px; font-size:12.5px; color:var(--warn); font-weight:600;">
                Only {{product.stock}} left in stock
            </span>
        }
      </div>

      <div class="pdp-actions">
        <button (click)="addCart()" class="btn btn-primary btn-lg" style="flex:1;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.6 12.4a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L21 7H6"/></svg>
          Add to cart
        </button>
      </div>

      <div class="pdp-meta-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/></svg>
        Free shipping in Cairo & Giza on orders over $50
      </div>
      <div class="pdp-meta-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M6 6v13a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Free returns within 14 days
      </div>
    </div>
</main>
