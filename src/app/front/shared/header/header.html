<header class="site-header">
  <div class="wrap header-main">
    <a style="margin: 0;padding: 0;" class="brand" routerLink="/home">
      <div class="brand-mark">S</div>
      <div class="brand-name">Storefront</div>
    </a>
    <ul class="nav-links">
      <li><a routerLinkActive="active" routerLink="/home">Home</a></li>
      <li><a routerLink="/search" routerLinkActive="active">Shop</a></li>
      <li><a routerLink="/profile" routerLinkActive="active">Profile</a></li>
    </ul>
    <div class="header-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <form (submit)="search($event)">
        <input id="Search" type="text" placeholder="Search products…">
      </form>
    </div>
    <div class="header-actions">
      <a class="head-icon-btn" routerLink="/profile" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a class="head-icon-btn" routerLink="/cart" aria-label="Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.6 12.4a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L21 7H6"/></svg>
        <span class="cart-count">3</span>
      </a>
    </div>
  </div>
</header>
