<header class="site-header">
  <div class="wrap header-main">
    <a style="margin: 0;padding: 0;" class="brand" routerLink="/home">
      <div class="brand-mark">S</div>
      <div class="brand-name">Storefront</div>
    </a>
    <ul class="nav-links">
      <li><a routerLinkActive="active" routerLink="/home">Home</a></li>
      <li><a routerLink="/search" routerLinkActive="active">Shop</a></li>
      <li><a routerLink="/profile" routerLinkActive="active">Profile</a></li>
    </ul>
    <div class="header-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <form (submit)="search($event)">
        <input id="Search" type="text" placeholder="Search products…">
      </form>
    </div>

    <div class="header-actions">
      @if (user) {
        <a class="user-chip" routerLink="/profile">
          <span class="user-chip-name">{{user.name}}</span>
        </a>
        <button style="cursor: pointer;" (click)="logout()" type="button" class="head-icon-btn" title="Log out" aria-label="Log out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
        <a class="head-icon-btn" routerLink="/cart" aria-label="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.6 12.4a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L21 7H6"/></svg><span class="cart-count">{{cartCount}}</span></a>
      }
      @else {
        <span style="font-size:13px; color:var(--text-dim);">New here?</span>
        <a routerLink="/signup" class="btn btn-secondary btn-sm">Create account</a>
      }
    </div>
  </div>
</header>
